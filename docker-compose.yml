# =============================================================================
# Channel Manager — Docker Compose 통합 환경
# =============================================================================
# PostgreSQL + Kotlin 앱 + Java 앱을 한 번에 실행
# 사용법:
#   전체 실행:        docker compose up -d
#   DB만 실행:        docker compose up -d postgres        (로컬 개발용)
#   로그 확인:        docker compose logs -f kotlin-app
#   전체 중지:        docker compose down
#   볼륨 포함 삭제:   docker compose down -v
# =============================================================================

# ---------------------------------------------------------------------------
# 앱 서비스 공통 설정 — YAML 앵커(&)로 정의, 각 서비스에서 <<: *로 병합
# x- 접두사: Docker Compose가 서비스로 인식하지 않는 확장 필드
# ---------------------------------------------------------------------------
x-app-common: &app-common
  environment:
    # DB 접속 정보 — Docker 네트워크에서는 서비스명(postgres)으로 접속
    DB_HOST: postgres                              # docker-compose 서비스명 → DNS 자동 해석
    DB_PORT: 5432                                  # PostgreSQL 포트
    DB_NAME: channel_manager                       # 데이터베이스명
    DB_USERNAME: postgres                          # DB 사용자명
    DB_PASSWORD: postgres                          # DB 비밀번호
    # Redis 접속 정보 (Phase 18)
    REDIS_HOST: redis                              # Redis 서비스명 → DNS 자동 해석
    REDIS_PORT: 6379                               # Redis 포트
    # Zipkin 분산 추적 (Phase 22)
    ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans  # Zipkin 수집 엔드포인트
  depends_on:
    postgres:
      condition: service_healthy                   # postgres가 healthy일 때만 시작
    redis:
      condition: service_healthy                   # redis가 healthy일 때만 시작
    zipkin:
      condition: service_healthy                   # Phase 22: zipkin이 healthy일 때만 시작
  restart: on-failure                              # 비정상 종료 시 자동 재시작

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 17 — 공용 데이터베이스
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:17-alpine                        # PostgreSQL 17 경량 이미지
    container_name: channel-manager-postgres          # 컨테이너 이름
    environment:
      POSTGRES_DB: channel_manager                   # 생성할 데이터베이스명
      POSTGRES_USER: postgres                        # DB 사용자명 (application.yml과 일치)
      POSTGRES_PASSWORD: postgres                    # DB 비밀번호 (application.yml과 일치)
    ports:
      - "5432:5432"                                  # 호스트:컨테이너 포트 매핑
    volumes:
      - channel-manager-pgdata:/var/lib/postgresql/data  # 데이터 영속화
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d channel_manager"]  # DB 준비 상태 확인
      interval: 5s                                   # 5초마다 체크
      timeout: 3s                                    # 3초 이내 응답 없으면 실패
      retries: 5                                     # 5회 실패 시 unhealthy
      start_period: 10s                              # 시작 후 10초는 실패 무시

  # ---------------------------------------------------------------------------
  # Redis 7 — 캐시 서버 (Phase 18)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine                            # Redis 7 경량 이미지
    container_name: channel-manager-redis             # 컨테이너 이름
    ports:
      - "6379:6379"                                  # 호스트:컨테이너 포트 매핑
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]             # PONG 응답 확인
      interval: 5s                                   # 5초마다 체크
      timeout: 3s                                    # 3초 이내 응답 없으면 실패
      retries: 5                                     # 5회 실패 시 unhealthy
      start_period: 5s                               # 시작 후 5초는 실패 무시

  # ---------------------------------------------------------------------------
  # Kotlin 모듈 — Spring Boot WebFlux (포트 8080)
  # ---------------------------------------------------------------------------
  kotlin-app:
    <<: *app-common                                  # 공통 설정 병합 (environment, depends_on, restart)
    build:
      context: .                                     # 빌드 컨텍스트: 프로젝트 루트 (멀티모듈)
      dockerfile: channel-manager-kotlin/Dockerfile  # Kotlin 모듈 Dockerfile 경로
    container_name: channel-manager-kotlin            # 컨테이너 이름
    ports:
      - "8080:8080"                                  # Kotlin 모듈 포트 매핑

  # ---------------------------------------------------------------------------
  # Java 모듈 — Spring Boot WebFlux (포트 8081)
  # ---------------------------------------------------------------------------
  java-app:
    <<: *app-common                                  # 공통 설정 병합 (environment, depends_on, restart)
    build:
      context: .                                     # 빌드 컨텍스트: 프로젝트 루트 (멀티모듈)
      dockerfile: channel-manager-java/Dockerfile    # Java 모듈 Dockerfile 경로
    container_name: channel-manager-java              # 컨테이너 이름
    ports:
      - "8081:8081"                                  # Java 모듈 포트 매핑

  # ---------------------------------------------------------------------------
  # Zipkin — 분산 추적 수집 및 시각화 (Phase 22)
  # ---------------------------------------------------------------------------
  zipkin:
    image: openzipkin/zipkin:3                       # Zipkin 3 최신 이미지
    container_name: channel-manager-zipkin            # 컨테이너 이름
    ports:
      - "9411:9411"                                  # Zipkin Web UI + API 포트
    environment:
      STORAGE_TYPE: mem                              # 인메모리 저장소 (개발용, 재시작 시 데이터 소멸)
      # 프로덕션에서는 STORAGE_TYPE=elasticsearch 또는 cassandra를 사용한다
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9411/health || exit 1"]  # Zipkin 헬스 체크
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Prometheus — 메트릭 수집 및 시계열 DB (Phase 19)
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v3.4.0                    # Prometheus 최신 안정 버전
    container_name: channel-manager-prometheus        # 컨테이너 이름
    ports:
      - "9090:9090"                                  # Prometheus Web UI 포트
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro  # 설정 파일 마운트 (읽기 전용)
      - prometheus-data:/prometheus                  # 시계열 데이터 영속화
    depends_on:
      kotlin-app:
        condition: service_started                   # 앱이 시작된 후 스크래핑 시작
      java-app:
        condition: service_started

  # ---------------------------------------------------------------------------
  # Grafana — 메트릭 시각화 대시보드 (Phase 19)
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.6.0                    # Grafana 최신 안정 버전
    container_name: channel-manager-grafana           # 컨테이너 이름
    ports:
      - "3000:3000"                                  # Grafana Web UI 포트
    environment:
      GF_SECURITY_ADMIN_USER: admin                  # 관리자 ID
      GF_SECURITY_ADMIN_PASSWORD: admin              # 관리자 비밀번호
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro  # 데이터소스 자동 프로비저닝
      - grafana-data:/var/lib/grafana                # 대시보드/설정 영속화
    depends_on:
      - prometheus                                   # Prometheus가 먼저 시작

# =============================================================================
# 네임드 볼륨 정의 — 컨테이너 삭제 후에도 데이터 유지
# =============================================================================
volumes:
  channel-manager-pgdata:                            # PostgreSQL 데이터 볼륨
  prometheus-data:                                   # Prometheus 시계열 데이터
  grafana-data:                                      # Grafana 대시보드/설정
