# =============================================================================
# Channel Manager — Docker Compose 통합 환경
# =============================================================================
# PostgreSQL + Kotlin 앱 + Java 앱을 한 번에 실행
# 사용법:
#   전체 실행:        docker compose up -d
#   DB만 실행:        docker compose up -d postgres        (로컬 개발용)
#   로그 확인:        docker compose logs -f kotlin-app
#   전체 중지:        docker compose down
#   볼륨 포함 삭제:   docker compose down -v
# =============================================================================

# ---------------------------------------------------------------------------
# 앱 서비스 공통 설정 — YAML 앵커(&)로 정의, 각 서비스에서 <<: *로 병합
# x- 접두사: Docker Compose가 서비스로 인식하지 않는 확장 필드
# ---------------------------------------------------------------------------
x-app-common: &app-common
  environment:
    # DB 접속 정보 — Docker 네트워크에서는 서비스명(postgres)으로 접속
    DB_HOST: postgres                              # docker-compose 서비스명 → DNS 자동 해석
    DB_PORT: 5432                                  # PostgreSQL 포트
    DB_NAME: channel_manager                       # 데이터베이스명
    DB_USERNAME: postgres                          # DB 사용자명
    DB_PASSWORD: postgres                          # DB 비밀번호
  depends_on:
    postgres:
      condition: service_healthy                   # postgres가 healthy일 때만 시작
  restart: on-failure                              # 비정상 종료 시 자동 재시작

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 17 — 공용 데이터베이스
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:17-alpine                        # PostgreSQL 17 경량 이미지
    container_name: channel-manager-postgres          # 컨테이너 이름
    environment:
      POSTGRES_DB: channel_manager                   # 생성할 데이터베이스명
      POSTGRES_USER: postgres                        # DB 사용자명 (application.yml과 일치)
      POSTGRES_PASSWORD: postgres                    # DB 비밀번호 (application.yml과 일치)
    ports:
      - "5432:5432"                                  # 호스트:컨테이너 포트 매핑
    volumes:
      - channel-manager-pgdata:/var/lib/postgresql/data  # 데이터 영속화
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d channel_manager"]  # DB 준비 상태 확인
      interval: 5s                                   # 5초마다 체크
      timeout: 3s                                    # 3초 이내 응답 없으면 실패
      retries: 5                                     # 5회 실패 시 unhealthy
      start_period: 10s                              # 시작 후 10초는 실패 무시

  # ---------------------------------------------------------------------------
  # Kotlin 모듈 — Spring Boot WebFlux (포트 8080)
  # ---------------------------------------------------------------------------
  kotlin-app:
    <<: *app-common                                  # 공통 설정 병합 (environment, depends_on, restart)
    build:
      context: .                                     # 빌드 컨텍스트: 프로젝트 루트 (멀티모듈)
      dockerfile: channel-manager-kotlin/Dockerfile  # Kotlin 모듈 Dockerfile 경로
    container_name: channel-manager-kotlin            # 컨테이너 이름
    ports:
      - "8080:8080"                                  # Kotlin 모듈 포트 매핑

  # ---------------------------------------------------------------------------
  # Java 모듈 — Spring Boot WebFlux (포트 8081)
  # ---------------------------------------------------------------------------
  java-app:
    <<: *app-common                                  # 공통 설정 병합 (environment, depends_on, restart)
    build:
      context: .                                     # 빌드 컨텍스트: 프로젝트 루트 (멀티모듈)
      dockerfile: channel-manager-java/Dockerfile    # Java 모듈 Dockerfile 경로
    container_name: channel-manager-java              # 컨테이너 이름
    ports:
      - "8081:8081"                                  # Java 모듈 포트 매핑

# =============================================================================
# 네임드 볼륨 정의 — 컨테이너 삭제 후에도 데이터 유지
# =============================================================================
volumes:
  channel-manager-pgdata:                            # PostgreSQL 데이터 볼륨
