<!DOCTYPE html>
<html lang="ko">
<head>
    <!-- 문서 인코딩 설정 — 한국어/일본어 등 다국어 게스트 이름을 올바르게 표시한다 -->
    <meta charset="UTF-8">
    <!-- 반응형 뷰포트 설정 — 모바일에서도 올바르게 렌더링한다 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 대시보드 페이지 제목 -->
    <title>Channel Manager — 실시간 대시보드</title>
    <!-- 대시보드 스타일시트 — CSS Grid, Flexbox, 이벤트 타입별 색상 정의 -->
    <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
    <!-- ============================== -->
    <!-- 헤더 영역: 제목 + 연결 상태 표시 -->
    <!-- ============================== -->
    <header class="header">
        <!-- 대시보드 제목 — 프로젝트명과 역할을 명시한다 -->
        <h1 class="header__title">Channel Manager</h1>
        <!-- SSE 연결 상태 표시 — EventSource.readyState에 따라 동적으로 변경된다 -->
        <!-- JavaScript에서 id로 접근하여 텍스트와 클래스를 변경한다 -->
        <div class="header__status">
            <span id="connection-indicator" class="status-dot status-dot--connecting"></span>
            <span id="connection-text">연결 중...</span>
        </div>
    </header>

    <!-- ============================== -->
    <!-- 메인 컨텐츠 영역 -->
    <!-- ============================== -->
    <main class="main">
        <!-- ============================== -->
        <!-- 상단 제어 패널: 시뮬레이터 + 통계 -->
        <!-- ============================== -->
        <section class="control-panel">
            <!-- 시뮬레이터 제어 카드 -->
            <!-- POST /api/simulator/start, /api/simulator/stop으로 제어한다 -->
            <div class="card card--simulator">
                <h2 class="card__title">채널 시뮬레이터</h2>
                <!-- 시뮬레이터 현재 상태 표시 — GET /api/simulator/status로 조회 -->
                <p class="simulator__status">
                    상태: <span id="simulator-status">확인 중...</span>
                </p>
                <!-- 시뮬레이터 제어 버튼 — onclick으로 JavaScript 함수를 호출한다 -->
                <div class="simulator__controls">
                    <!-- 시작 버튼 — POST /api/simulator/start -->
                    <button id="btn-start" class="btn btn--start" onclick="startSimulator()">
                        시작
                    </button>
                    <!-- 중지 버튼 — POST /api/simulator/stop -->
                    <button id="btn-stop" class="btn btn--stop" onclick="stopSimulator()">
                        중지
                    </button>
                </div>
            </div>

            <!-- 이벤트 통계 카드 -->
            <!-- SSE로 수신한 이벤트를 클라이언트 측에서 타입별로 집계한다 -->
            <div class="card card--stats">
                <h2 class="card__title">이벤트 통계</h2>
                <!-- 이벤트 타입별 카운터 — JavaScript에서 수신할 때마다 증가시킨다 -->
                <div class="stats__grid">
                    <!-- 예약 생성 카운터 -->
                    <div class="stat stat--reservation-created">
                        <span class="stat__count" id="count-reservation-created">0</span>
                        <span class="stat__label">예약 생성</span>
                    </div>
                    <!-- 재고 변경 카운터 -->
                    <div class="stat stat--inventory-updated">
                        <span class="stat__count" id="count-inventory-updated">0</span>
                        <span class="stat__label">재고 변경</span>
                    </div>
                    <!-- 채널 동기화 카운터 -->
                    <div class="stat stat--channel-synced">
                        <span class="stat__count" id="count-channel-synced">0</span>
                        <span class="stat__label">채널 동기화</span>
                    </div>
                    <!-- 예약 취소 카운터 (Phase 7에서 활성화) -->
                    <div class="stat stat--reservation-cancelled">
                        <span class="stat__count" id="count-reservation-cancelled">0</span>
                        <span class="stat__label">예약 취소</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- ============================== -->
        <!-- 실시간 이벤트 스트림 테이블 -->
        <!-- ============================== -->
        <section class="card card--events">
            <div class="card__header">
                <h2 class="card__title">실시간 이벤트 스트림</h2>
                <!-- 이벤트 목록 초기화 버튼 — 화면의 이벤트만 지우고 SSE 연결은 유지한다 -->
                <button class="btn btn--clear" onclick="clearEvents()">
                    초기화
                </button>
            </div>
            <!-- 이벤트 테이블 — 최신 이벤트가 맨 위에 표시된다 (prepend) -->
            <div class="events__table-wrapper">
                <table class="events__table">
                    <thead>
                        <tr>
                            <!-- 테이블 헤더 — 각 열의 의미를 표시한다 -->
                            <th>시간</th>
                            <th>이벤트 타입</th>
                            <th>채널</th>
                            <th>객실 타입</th>
                            <th>상세</th>
                        </tr>
                    </thead>
                    <!-- tbody — JavaScript에서 이벤트 행을 동적으로 추가한다 -->
                    <!-- id="event-list"로 접근하여 insertBefore로 맨 위에 추가한다 -->
                    <tbody id="event-list">
                        <!-- 이벤트 행이 여기에 동적으로 추가된다 -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- 대시보드 JavaScript — EventSource 연결, DOM 조작, API 호출 -->
    <script src="/js/dashboard.js"></script>
</body>
</html>
