# PostgreSQL Deployment + PersistentVolumeClaim
# Deployment: Pod의 원하는 상태를 선언하고 ReplicaSet이 이를 유지한다
# PVC: 영속적 스토리지를 요청하여 Pod 재시작 시에도 데이터가 유지된다
# 학습 환경에서는 단일 레플리카로 운영한다 (프로덕션에서는 StatefulSet + 레플리카 권장)
---
# PersistentVolumeClaim — 영속적 스토리지 요청
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc               # PVC 이름
  namespace: channel-manager
spec:
  accessModes:
    - ReadWriteOnce                 # 단일 노드에서 읽기/쓰기
  resources:
    requests:
      storage: 1Gi                  # 1GB 스토리지 요청
---
# Deployment — PostgreSQL Pod 관리
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres                   # Deployment 이름
  namespace: channel-manager
  labels:
    app: postgres                  # 라벨
spec:
  replicas: 1                      # 단일 인스턴스 (DB는 StatefulSet이 적합하나 학습 목적)
  selector:
    matchLabels:
      app: postgres                # 이 라벨을 가진 Pod를 관리
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine          # 프로덕션과 동일한 이미지
          ports:
            - containerPort: 5432            # PostgreSQL 포트
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_NAME               # ConfigMap에서 DB 이름 주입
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: POSTGRES_USER         # Secret에서 사용자명 주입
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: POSTGRES_PASSWORD     # Secret에서 비밀번호 주입
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data  # 데이터 디렉토리
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER"]  # 환경변수로 사용자명 참조
            initialDelaySeconds: 5           # 시작 후 5초 대기
            periodSeconds: 5                 # 5초마다 체크
          resources:
            requests:
              memory: "128Mi"                # 최소 메모리 보장
              cpu: "100m"                    # 최소 CPU (100 millicores)
            limits:
              memory: "256Mi"                # 최대 메모리
              cpu: "250m"                    # 최대 CPU
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc          # PVC 연결
