# Java 모듈 Service — 외부에서 접근 가능한 LoadBalancer
# Kotlin 서비스와 동일한 구조이지만 포트가 8081이다
apiVersion: v1
kind: Service
metadata:
  name: java-app                   # Service 이름 = DNS 이름
  namespace: channel-manager
spec:
  selector:
    app: java-app                  # 이 라벨을 가진 Pod로 트래픽 라우팅
  ports:
    - port: 8081                   # Service 포트 (외부 접근 포트)
      targetPort: 8081             # Pod 포트
  type: LoadBalancer               # 외부 노출
