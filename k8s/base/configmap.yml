# ConfigMap — 비민감 설정 데이터
# Pod의 환경변수로 주입되어 애플리케이션 설정을 제공한다
# application.yml의 ${ENV_VAR:기본값}이 이 값으로 대체된다
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config                 # ConfigMap 이름
  namespace: channel-manager       # 네임스페이스
data:
  # DB 접속 정보 — K8s Service 이름으로 접근
  DB_HOST: "postgres"              # PostgreSQL Service 이름 → K8s DNS로 해석
  DB_PORT: "5432"                  # PostgreSQL 포트
  DB_NAME: "channel_manager"       # 데이터베이스명
  # Redis 접속 정보
  REDIS_HOST: "redis"              # Redis Service 이름
  REDIS_PORT: "6379"               # Redis 포트
  # Rate Limiting
  RATE_LIMIT_CAPACITY: "50"        # IP당 초당 최대 요청 수
  RATE_LIMIT_REFILL: "50"          # 초당 충전 토큰 수
