# Secret — 민감한 설정 데이터 (비밀번호, 토큰 등)
# base64로 인코딩하여 저장 (암호화가 아님, etcd 암호화는 별도 설정 필요)
# 주의: 이 파일은 학습 목적으로 Git에 포함되어 있다
#   프로덕션에서는 반드시 아래 방법 중 하나를 사용해야 한다:
#   - 이 파일을 .gitignore에 추가하고 별도 관리
#   - Sealed Secrets (kubeseal) — Git에 암호화된 상태로 커밋
#   - External Secrets Operator — AWS Secrets Manager / Vault 연동
# base64 인코딩 방법: echo -n 'postgres' | base64 → cG9zdGdyZXM=
apiVersion: v1
kind: Secret
metadata:
  name: db-secret                  # Secret 이름
  namespace: channel-manager       # 네임스페이스
type: Opaque                       # 범용 시크릿 타입
data:
  DB_USERNAME: cG9zdGdyZXM=        # base64("postgres")
  DB_PASSWORD: cG9zdGdyZXM=        # base64("postgres")
  POSTGRES_USER: cG9zdGdyZXM=     # base64("postgres") — PostgreSQL 컨테이너용
  POSTGRES_PASSWORD: cG9zdGdyZXM= # base64("postgres") — PostgreSQL 컨테이너용
