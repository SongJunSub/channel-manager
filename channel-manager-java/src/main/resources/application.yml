# Java 모듈 애플리케이션 설정

spring:
  application:
    name: channel-manager-java  # 애플리케이션 이름

  # R2DBC 데이터소스 설정 (논블로킹 DB 연결)
  # ${ENV_VAR:기본값} — 환경변수가 있으면 사용, 없으면 기본값 (로컬 개발용)
  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:channel_manager}  # R2DBC PostgreSQL 연결 URL
    username: ${DB_USERNAME:postgres}  # DB 사용자명
    password: ${DB_PASSWORD:postgres}  # DB 비밀번호

  # Flyway 마이그레이션 설정 (JDBC 기반으로 동작)
  # R2DBC 환경에서 Flyway는 별도의 JDBC URL을 지정해야 한다
  flyway:
    enabled: true  # Flyway 활성화
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:channel_manager}  # JDBC URL (Flyway는 JDBC 사용)
    user: ${DB_USERNAME:postgres}  # DB 사용자명
    password: ${DB_PASSWORD:postgres}  # DB 비밀번호
    locations: classpath:db/migration  # 마이그레이션 SQL 파일 경로 (common 모듈에서 제공)

  # Phase 18: Redis 설정 (Reactive Lettuce 드라이버)
  data:
    redis:
      host: ${REDIS_HOST:localhost}  # Redis 호스트 (Docker: redis 서비스명)
      port: ${REDIS_PORT:6379}       # Redis 포트

# Phase 21: JWT 설정
jwt:
  secret: ${JWT_SECRET:channel-manager-jwt-secret-key-for-development-only-min-256-bits-long}  # HMAC-SHA256 서명 키 (최소 256비트)
  expiration-ms: ${JWT_EXPIRATION:3600000}  # 토큰 만료 시간 (기본 1시간 = 3600000ms)
  # 주의: 프로덕션에서는 환경변수 JWT_SECRET으로 강력한 랜덤 키를 주입해야 한다

# Phase 17: Rate Limiting 설정
rate-limit:
  capacity: ${RATE_LIMIT_CAPACITY:50}          # 버킷 최대 용량 (기본 50/초)
  refill-tokens: ${RATE_LIMIT_REFILL:50}       # 충전 토큰 수

server:
  port: 8081  # Java 모듈 서버 포트 (Kotlin 모듈과 충돌 방지)

# Phase 19: Actuator + Prometheus 모니터링 설정
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus  # 외부 노출할 Actuator 엔드포인트
  endpoint:
    health:
      show-details: always  # 헬스 체크 상세 정보 표시 (DB, Redis 상태 포함)
      # 주의: 프로덕션에서는 when-authorized로 변경하여 인증된 사용자만 상세 정보를 볼 수 있도록 해야 한다
  prometheus:
    metrics:
      export:
        enabled: true  # Prometheus 메트릭 내보내기 활성화

# Phase 11: SpringDoc OpenAPI 설정
springdoc:
  api-docs:
    path: /v3/api-docs  # OpenAPI 스펙 JSON 경로
  swagger-ui:
    path: /swagger-ui.html  # Swagger UI 접근 경로
    operations-sorter: method  # HTTP 메서드 기준 정렬 (GET→POST→PUT→DELETE)
    tags-sorter: alpha  # 태그(컨트롤러) 이름 기준 알파벳 정렬
