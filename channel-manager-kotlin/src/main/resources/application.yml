# Kotlin 모듈 애플리케이션 설정

spring:
  application:
    name: channel-manager-kotlin  # 애플리케이션 이름

  # R2DBC 데이터소스 설정 (논블로킹 DB 연결)
  # ${ENV_VAR:기본값} — 환경변수가 있으면 사용, 없으면 기본값 (로컬 개발용)
  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:channel_manager}  # R2DBC PostgreSQL 연결 URL
    username: ${DB_USERNAME:postgres}  # DB 사용자명
    password: ${DB_PASSWORD:postgres}  # DB 비밀번호

  # Flyway 마이그레이션 설정 (JDBC 기반으로 동작)
  # R2DBC 환경에서 Flyway는 별도의 JDBC URL을 지정해야 한다
  flyway:
    enabled: true  # Flyway 활성화
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:channel_manager}  # JDBC URL (Flyway는 JDBC 사용)
    user: ${DB_USERNAME:postgres}  # DB 사용자명
    password: ${DB_PASSWORD:postgres}  # DB 비밀번호
    locations: classpath:db/migration  # 마이그레이션 SQL 파일 경로 (common 모듈에서 제공)

server:
  port: 8080  # Kotlin 모듈 서버 포트

# Phase 11: SpringDoc OpenAPI 설정
springdoc:
  api-docs:
    path: /v3/api-docs  # OpenAPI 스펙 JSON 경로
  swagger-ui:
    path: /swagger-ui.html  # Swagger UI 접근 경로
    operations-sorter: method  # HTTP 메서드 기준 정렬 (GET→POST→PUT→DELETE)
    tags-sorter: alpha  # 태그(컨트롤러) 이름 기준 알파벳 정렬
